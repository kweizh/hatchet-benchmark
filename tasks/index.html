ne to a log file indicating how many records were processed.\n\n## Implementation Guide\n1. Create a Python script `/home/user/app/worker.py`.\n2. Initialize the Hatchet client and define a workflow with `@hatchet.workflow(on_crons=[\"* * * * *\"])`.\n3. Define a task inside the workflow that reads `/home/user/app/records.json` and appends `Processed X records` to `/home/user/app/output.log`.\n4. Start the Hatchet worker in the script.\n\n## Constraints\n- Project path: `/home/user/app`\n- Log file: `/home/user/app/output.log`\n- Use `hatchet-sdk` for Python.\n- Ensure the Hatchet API token is loaded from the environment (`HATCHET_CLIENT_TOKEN`).a:T544,# Durable Event Wait with Lookback Window\n\n## Background\nHatchet's durable tasks can pause execution and wait for an external event to arrive using `ctx.aio_wait_for_event`. However, a common race condition occurs when the external event is triggered *before* the task actually begins waiting for it. To solve this, Hatchet provides a lookback window feature that allows the wait condition to consider events that arrived recently.\n\n## Requirements\nWrite a Python script that defines a Hatchet durable task which waits for a user creation event, but correctly handles the case where the event might have already occurred up to 5 minutes before the wait started.\n\n- Create a file `worker.py` in `/home/user/project`.\n- Define a Pydantic model `UserInput` with a `user_id` string field.\n- Define a durable task named `ProcessUser` that takes `UserInput`.\n- Inside the task, wait for an event with key `user:create`.\n- The wait must use a CEL expression to match the `user_id` from the input.\n- The wait must use a scope of `user_id:\u003cuser_id\u003e`.\n- The wait must include a lookback window of 5 minutes to catch events that happened before the wait started.\n- The task should return the event payload.\n\n## Constraints\n- Project path: /home/user/project\n- Use `hatchet-sdk` for Python.\n- Use `timedelta` from the `datetime` module for the lookback window.b:T7a2,"])</script><script>self.__next_f.push([1,"# Hatchet Durable Execution and Failure Recovery\n\n## Background\nHatchet is a distributed task queue that supports \"durable execution\". Durable tasks can survive worker crashes and restarts by checkpointing progress (e.g., when spawning child tasks or waiting). You will implement a durable task that crashes midway, and verify it resumes correctly upon worker restart without re-executing completed steps.\n\n## Requirements\n1. Create a Hatchet worker in `/home/user/project/worker.py` that registers a durable task named `failure_recovery_task`.\n2. The task must perform two logical steps:\n   - **Step 1**: Append the string `step1\\n` to `/home/user/project/output.log`.\n   - **Crash**: Check if `/home/user/project/crashed.flag` exists. If it does not exist, create it, and forcefully crash the worker process using `os._exit(1)`.\n   - **Step 2**: If the crash flag exists, append the string `step2\\n` to `/home/user/project/output.log` and return.\n3. Because the task must be durable, when it recovers from the crash, it must **NOT** execute Step 1 again. You must use Hatchet's durable execution primitives (e.g., spawning a child task for Step 1) to ensure `step1\\n` is only written exactly ONCE to the log file.\n4. Create a bash script `/home/user/project/run.sh` that runs the worker in a continuous `while true` loop, so that if it crashes, it automatically restarts.\n5. Create a Python script `/home/user/project/trigger.py` that triggers `failure_recovery_task` and synchronously waits for it to complete.\n\n## Constraints\n- Project path: `/home/user/project`\n- Log file: `/home/user/project/output.log`\n- You must use the `hatchet-sdk` package in Python.\n- Do NOT mock Hatchet; use the real Hatchet Cloud API via the `HATCHET_CLIENT_TOKEN` environment variable, which is already set in the environment.\n- Ensure your code is executable and handles the crash and recovery autonom stTask` should execute immediately because `DurableSleepTask` frees the slot.\n\n## Constraints\n- Project path: /home/user/hatchet-slots\n- Start command: `npx ts-node trigger.ts` (or compile and run)\n- Use the real Hatchet API key from the environment (`HATCHET_CLIENT_TOKEN`).\n- Do not provide an implementation guide in the instruction.\n\n## Integrations\n- None"])</script><script>self.__next_f.push([1,"11:T560,"])</script><script>self.__next_f.push([1,"# Hatchet Workflow Cancellation\n\n## Background\nHatchet provides a mechanism for canceling task executions gracefully, allowing you to signal to running tasks that they should stop. This is useful for long-running tasks that may no longer be needed.\n\n## Requirements\n1. Create a Hatchet workflow named `cancellation_workflow` in `worker.py` with a task `check_flag`.\n2. The task should loop 10 times, sleeping for 1 second each iteration.\n3. In each iteration, it should check `ctx.exit_flag`. If True, it must print \"Task has been cancelled\" and raise a `ValueError(\"Task has been cancelled\")`.\n4. If the loop completes without cancellation, it should return `{\"error\": \"Task should have been cancelled\"}`.\n5. The `worker.py` script must initialize a Hatchet client, create a worker named `cancel-worker`, register the workflow, and start the worker.\n6. Create a script `trigger.py` that initializes a Hatchet client, triggers the `cancellation_workflow` asynchronously (fire-and-forget), sleeps for 2 seconds, and then cancels the workflow run using `hatchet.runs.cancel(...)`.\n7. The `trigger.py` script must write the `workflow_run_id` of the triggered run to a file named `run_id.txt` in the project directory before exiting.\n\n## Constraints\n- Project path: `/home/user/myproject`\n- Both scripts must be executable with `python3`.\n- You must use the `hatchet-sdk` package."])</script><script>self.__next_f.push([1,"0:{\"P\":null,\"b\":\"6BD9O9xq5mYbHBTjbEj0y\",\"c\":[\"\",\"tasks\",\"\"],\"q\":\"\",\"i\":fa
